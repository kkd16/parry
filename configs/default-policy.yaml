# https://github.com/kkd16/parry/blob/main/docs/POLICY.md

version: 1
mode: observe

check_mode_confirm: block

notifications:
  provider: ""
  confirmation_timeout: 5m
  ntfy:
    topic: ""
    server: https://ntfy.sh

default_action: confirm

parry_paths:
  - "~/.parry/*"
  - "~/.claude/*"
  - "~/.cursor/*"
  - "~/go/bin/*"
  - "/opt/homebrew/Library/Taps/*"
  - "/usr/local/Homebrew/Library/Taps/*"
  - "/home/linuxbrew/.linuxbrew/Library/Taps/*"

protected_paths:
  - "~/.ssh/*"
  - "~/.aws/*"
  - "~/.gnupg/*"
  - "/etc/shadow"
  - "/etc/passwd"
  - ".env"
  - ".env.*"
  - "*credentials*"

rules:
  shell:
    default_action: confirm
    allow:
      - ls
      - cat
      - head
      - tail
      - less
      - more
      - grep
      - rg
      - find
      - wc
      - echo
      - pwd
      - which
      - whoami
      - env
      - printenv
      - date
      - file
      - stat
      - du
      - df
      - tree
      - diff
      - ps
      - top
      - htop
      - lsof
      - uname
      - hostname
      - id
      - groups
      - history
      - man
      - help
      - type
      - command
      - true
      - false
      - sleep
      - test
      - seq
      - column
      - tput
      - basename
      - dirname
      - realpath
      - readlink
      - sed
      - awk
      - jq
      - yq
      - xargs
      - sort
      - uniq
      - cut
      - tr
      - tee
      - cp
      - mv
      - mkdir
      - touch
      - tar
      - zip
      - unzip
      - gzip
      - gunzip
      - ping
      - "git status"
      - "git log"
      - "git diff"
      - "git show"
      - "git branch"
      - "git remote"
      - "git tag"
      - "git add"
      - "git commit"
      - "git checkout"
      - "git switch"
      - "git merge"
      - "git rebase"
      - "git stash"
      - "git reset"
      - python
      - python3
      - node
      - npx
      - "npm install"
      - "npm run"
      - "npm test"
      - yarn
      - pnpm
      - bun
      - ruby
      - bundle
      - "pip install"
      - pytest
      - jest
      - "go build"
      - "go test"
      - "go run"
      - "go vet"
      - "go fmt"
      - "go mod"
      - "go get"
      - gofmt
      - golangci-lint
      - "cargo build"
      - "cargo test"
      - "cargo run"
      - "cargo check"
      - "cargo fmt"
      - "cargo clippy"
      - make
      - mvn
      - gradle
      - "docker ps"
      - "docker images"
      - "docker logs"
      - "docker inspect"
      - "docker build"
      - "kubectl get"
      - "kubectl describe"
      - "kubectl logs"
      - "terraform plan"
      - "terraform fmt"
      - "terraform validate"
    confirm:
      - rm
      - rmdir
      - chmod
      - chown
      - kill
      - killall
      - pkill
      - truncate
      - shred
      - "git clean"
      - curl
      - wget
      - ssh
      - scp
      - rsync
      - "git push"
      - "git fetch"
      - "git pull"
      - "git clone"
      - "npm publish"
      - "docker push"
      - nc
    block:
      - sudo
      - su
      - doas
      - dd
      - mkfs
      - mkfs.ext4
      - mkfs.xfs
      - fdisk
      - parted
      - shutdown
      - reboot
      - halt
      - poweroff
      - iptables
      - nft

  file_edit:
    default_action: allow

  file_read:
    default_action: allow

rate_limit:
  window: 3m
  max: 50
