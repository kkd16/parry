# Parry default policy
# See docs/plan/ARCHITECTURE.md for action semantics and tool name reference.

version: 1
mode: observe

check_mode_confirm: block

notifications:
  provider: ""              # ntfy (leave blank to disable)
  confirmation_timeout: 5m
  ntfy:
    topic: ""
    server: https://ntfy.sh

# Action applied to tool calls that don't match any rule or listed binary.
default_action: confirm

# Parry internals - paths parry needs to protect itself and the tools it guards.
# Modifying these could let an agent tamper with parry's own config or hooks.
parry_paths:
  - "~/.parry/*"
  - "~/.claude/*"
  - "~/.cursor/*"
  - "~/go/bin/*"
  - "/opt/homebrew/Library/Taps/*"
  - "/usr/local/Homebrew/Library/Taps/*"
  - "/home/linuxbrew/.linuxbrew/Library/Taps/*"

# Paths that are off limits to all tools. Any tool call that references
# a protected path is blocked regardless of binary classification.
protected_paths:
  - "~/.ssh/*"
  - "~/.aws/*"
  - "~/.gnupg/*"
  - "/etc/shadow"
  - "/etc/passwd"
  - ".env"
  - ".env.*"
  - "*credentials*"

rules:
  shell:
    default_action: confirm
    allow:
      - ls
      - cat
      - head
      - tail
      - less
      - more
      - grep
      - rg
      - find
      - wc
      - echo
      - pwd
      - which
      - whoami
      - env
      - printenv
      - date
      - file
      - stat
      - du
      - df
      - tree
      - diff
      - "git status"
      - "git log"
      - "git diff"
      - "git show"
      - "git branch"
      - cp
      - mv
      - mkdir
      - touch
      - tee
      - sed
      - awk
      - "git add"
      - "git commit"
      - "git checkout"
      - "git switch"
      - "git merge"
      - "git rebase"
      - "git stash"
      - "git reset"
      - "npm install"
      - "npm run"
      - "npm test"
      - "go build"
      - "go test"
      - "go mod"
      - "go get"
      - "pip install"
      - make
      - "cargo build"
      - "cargo test"
    confirm:
      - rm
      - rmdir
      - chmod
      - chown
      - kill
      - killall
      - pkill
      - truncate
      - shred
      - "git clean"
      - curl
      - wget
      - ssh
      - scp
      - rsync
      - "git push"
      - "git fetch"
      - "git pull"
      - "git clone"
      - "npm publish"
      - "docker push"
      - ping
      - nc
    block:
      - sudo
      - su
      - doas

  file_edit:
    default_action: allow

  file_read:
    default_action: allow

rate_limit:
  window: 3m
  max: 50
